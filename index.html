<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BondStats Terminal Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== BASE ===== */
body{
margin:0;
font-family:system-ui;
background:#040812;
color:#e2e8f0;
}

.container{
max-width:1600px;
margin:auto;
padding:25px;
}

h1{
margin-bottom:20px;
}

/* ===== LAYOUT ===== */

.grid{
display:grid;
grid-template-columns:420px 1fr;
gap:20px;
}

/* ===== PANEL ===== */

.panel{
background:#0f172a;
padding:20px;
border-radius:12px;
}

/* ===== INPUT ===== */

label{
font-size:12px;
color:#94a3b8;
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:12px;
background:#1e293b;
border:none;
color:white;
}

button{
width:100%;
padding:12px;
background:#f97316;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:8px;
}

/* ===== METRICS ===== */

.metrics{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

.metric{
background:#020617;
padding:12px;
border-radius:8px;
}

.metric-title{
font-size:11px;
color:#94a3b8;
}

.metric-value{
font-size:20px;
}

/* ===== CHARTS ===== */

.charts{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:15px;
}

canvas{
background:#020617;
border-radius:10px;
}

/* ===== TABLE ===== */

table{
width:100%;
margin-top:10px;
font-size:12px;
}

td{
padding:6px;
border-bottom:1px solid #1e293b;
}

/* ===== PRO LOCK ===== */

.lock{
opacity:0.2;
position:relative;
}

.lock::after{
content:"PRO";
position:absolute;
top:10px;
right:10px;
color:#f97316;
font-size:11px;
}

/* ===== BUTTON ===== */

.upgrade{
background:#2563eb;
}

</style>

</head>
<body>

<div class="container">

<h1>Defense Bond Impact Terminal</h1>

<div class="grid">

<!-- LEFT PANEL -->

<div class="panel">

<label>Defense Spending</label>
<input type="range" id="spending" min="0" max="400" value="120">

<label>Inflation</label>
<select id="inflation">
<option>Low</option>
<option selected>Moderate</option>
<option>High</option>
</select>

<label>Liquidity</label>
<select id="liquidity">
<option>Strong</option>
<option selected>Normal</option>
<option>Weak</option>
</select>

<label>Policy</label>
<select id="policy">
<option>Supportive</option>
<option selected>Neutral</option>
<option>Restrictive</option>
</select>

<button onclick="run()">Run Model</button>
<button onclick="shock()">Shock Scenario</button>
<button class="upgrade" onclick="upgrade()">Unlock Pro</button>

</div>

<!-- RIGHT PANEL -->

<div class="panel">

<!-- METRICS -->

<div class="metrics">
<div class="metric"><div class="metric-title">Impact</div><div id="impact"></div></div>
<div class="metric"><div class="metric-title">Confidence</div><div id="confidence"></div></div>
<div class="metric"><div class="metric-title">Regime</div><div id="regime"></div></div>
<div class="metric"><div class="metric-title">Signal</div><div id="signal"></div></div>
<div class="metric"><div class="metric-title">Decision</div><div id="decision"></div></div>
</div>

<!-- CHARTS -->

<div class="charts">
<canvas id="timeline" width="500" height="200"></canvas>
<canvas id="curve" width="500" height="200"></canvas>
<canvas id="factors" width="500" height="200"></canvas>
<canvas id="compareChart" width="500" height="200"></canvas>
</div>

<!-- TABLE -->

<table id="table"></table>

<!-- PRO -->

<div id="proArea" class="lock">

<h3>Advanced Analysis</h3>

<div id="analysis"></div>
<div id="risk"></div>
<div id="compare"></div>

</div>

</div>

</div>

</div>

<script>

let pro=false;

/* ===== MODEL ===== */

function compute(i){

let impact =
i.spending*0.2 +
(i.inflation==="High"?25:10) +
(i.liquidity==="Weak"?20:5) +
(i.policy==="Restrictive"?15:5);

impact=Math.min(impact,100);

let confidence=70-(i.liquidity==="Weak"?20:5);

let regime=impact<40?"Stable":impact<70?"Adjustment":"Repricing";

let signal=impact<30?"Weak":impact<60?"Building":"Strong";

let decision=
impact>70?"Reduce Duration":
impact>40?"Hedge Risk":
"Hold";

return {impact,confidence,regime,signal,decision};

}

/* ===== TIMELINE ===== */

function drawTimeline(score){

let ctx=timeline.getContext("2d");
ctx.clearRect(0,0,500,200);

ctx.strokeStyle="orange";
ctx.beginPath();

for(let i=0;i<30;i++){
let y=200-(score*(i/30))*1.5;
ctx.lineTo(i*16,y);
}

ctx.stroke();

}

/* ===== CURVE ===== */

function drawCurve(score){

let ctx=curve.getContext("2d");
ctx.clearRect(0,0,500,200);

let base=[2,2.2,2.5,3,3.3];
let adj=base.map(x=>x+score/80);

ctx.strokeStyle="cyan";
ctx.beginPath();

adj.forEach((v,i)=>{
ctx.lineTo(i*100,200-v*40);
});

ctx.stroke();

}

/* ===== FACTORS ===== */

function drawFactors(score){

let ctx=factors.getContext("2d");
ctx.clearRect(0,0,500,200);

let vals=[score,score*0.8,score*0.6,score*0.5];

vals.forEach((v,i)=>{
ctx.fillStyle="orange";
ctx.fillRect(i*100,200-v*1.5,50,v*1.5);
});

}

/* ===== COMPARE ===== */

function drawCompare(score){

let ctx=compareChart.getContext("2d");
ctx.clearRect(0,0,500,200);

ctx.strokeStyle="orange";
ctx.beginPath();

for(let i=0;i<20;i++){
ctx.lineTo(i*20,200-(score*(i/20)));
}
ctx.stroke();

ctx.strokeStyle="red";
ctx.beginPath();

for(let i=0;i<20;i++){
ctx.lineTo(i*20,200-((score+20)*(i/20)));
}
ctx.stroke();

}

/* ===== TABLE ===== */

function buildTable(score){

table.innerHTML=`
<tr><td>Supply</td><td>${score>60?"High":"Moderate"}</td></tr>
<tr><td>Inflation</td><td>${score>50?"Elevated":"Contained"}</td></tr>
<tr><td>Liquidity</td><td>${score>60?"Weak":"Normal"}</td></tr>
<tr><td>Volatility</td><td>${score>60?"High":"Moderate"}</td></tr>
<tr><td>Term Premium</td><td>${score>60?"Rising":"Stable"}</td></tr>
`;

}

/* ===== RUN ===== */

function run(){

let i={
spending:+spending.value,
inflation:inflation.value,
liquidity:liquidity.value,
policy:policy.value
};

let d=compute(i);

impact.innerText=Math.round(d.impact);
confidence.innerText=Math.round(d.confidence);
regime.innerText=d.regime;
signal.innerText=d.signal;
decision.innerText=d.decision;

drawTimeline(d.impact);
drawCurve(d.impact);
drawFactors(d.impact);
drawCompare(d.impact);
buildTable(d.impact);

/* PRO */

if(pro){

analysis.innerHTML=`Markets in ${d.regime} regime driven by fiscal expansion.`;

risk.innerHTML=`Volatility: ${d.impact>60?"High":"Moderate"}`;

compare.innerHTML=`Scenario delta: +20 stress impact`;

}

}

/* ===== SHOCK ===== */

function shock(){
spending.value=Math.min(+spending.value+120,400);
inflation.value="High";
liquidity.value="Weak";
policy.value="Restrictive";
run();
}

/* ===== UPGRADE ===== */

function upgrade(){
pro=true;
proArea.classList.remove("lock");
run();
alert("Pro unlocked (connect Stripe next)");
}

run();

</script>

</body>
</html>
