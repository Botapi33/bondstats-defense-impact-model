<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BondStats Terminal Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:system-ui;background:#040812;color:#e2e8f0;}
.container{max-width:1600px;margin:auto;padding:25px;}
.grid{display:grid;grid-template-columns:420px 1fr;gap:20px;}
.panel{background:#0f172a;padding:20px;border-radius:12px;}

label{font-size:12px;color:#94a3b8;}
input,select{width:100%;padding:10px;margin:6px 0 12px;background:#1e293b;border:none;color:white;}
button{width:100%;padding:12px;background:#f97316;border:none;color:white;font-weight:bold;cursor:pointer;margin-top:8px;}

.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.metric{background:#020617;padding:12px;border-radius:8px;}
.metric-title{font-size:11px;color:#94a3b8;}
.metric-value{font-size:20px;}

canvas{background:#020617;border-radius:10px;margin-top:10px;}

.lock{opacity:0.2;position:relative;}
.lock::after{content:"PRO";position:absolute;top:10px;right:10px;color:#f97316;}

.sliderValue{float:right;color:#f97316;font-size:12px;}

.tabs{display:flex;gap:10px;margin:10px 0;}
.tab{padding:6px 10px;background:#020617;cursor:pointer;font-size:12px;}
.tab.active{background:#f97316;}
.tabContent{display:none;}
.tabContent.active{display:block;}
</style>
</head>

<body>

<div class="container">
<h1>Defense Bond Impact Terminal</h1>

<div class="grid">

<div class="panel">

<label>Defense Spending <span id="spVal" class="sliderValue"></span></label>
<input type="range" id="spending" min="0" max="400" value="120" oninput="updateSlider()">

<label>Inflation</label>
<select id="inflation">
<option>Low</option>
<option selected>Moderate</option>
<option>High</option>
</select>

<label>Liquidity</label>
<select id="liquidity">
<option>Strong</option>
<option selected>Normal</option>
<option>Weak</option>
</select>

<label>Policy</label>
<select id="policy">
<option>Supportive</option>
<option selected>Neutral</option>
<option>Restrictive</option>
</select>

<button onclick="run()">Run Model</button>
<button onclick="shock()">Shock</button>
<button onclick="upgrade()">Unlock Pro</button>

</div>

<div class="panel">

<div class="metrics">
<div class="metric"><div class="metric-title">Impact</div><div id="impact"></div></div>
<div class="metric"><div class="metric-title">Confidence</div><div id="confidence"></div></div>
<div class="metric"><div class="metric-title">Regime</div><div id="regime"></div></div>
<div class="metric"><div class="metric-title">Signal</div><div id="signal"></div></div>
<div class="metric"><div class="metric-title">Decision</div><div id="decision"></div></div>
</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('t1')">Overview</div>
<div class="tab" onclick="switchTab('t2')">Curve</div>
<div class="tab" onclick="switchTab('t3')">Risk</div>
<div class="tab" onclick="switchTab('t4')">Scenario</div>
</div>

<div id="t1" class="tabContent active">
<canvas id="timeline" width="500" height="200"></canvas>
</div>

<div id="t2" class="tabContent">
<canvas id="curve" width="500" height="200"></canvas>
</div>

<div id="t3" class="tabContent">
<div id="riskDetails"></div>
</div>

<div id="t4" class="tabContent">
<div id="scenarioDetails"></div>
</div>

<table id="table"></table>
<div id="insight"></div>

<div id="proArea" class="lock">
<h3>Advanced Analysis</h3>
<div id="analysis"></div>
</div>

</div>

</div>
</div>

<script>

let pro=false;

function updateSlider(){
spVal.innerText = spending.value + " bn";
}

function compute(i){
let impact=i.spending*0.2+(i.inflation==="High"?25:10)+(i.liquidity==="Weak"?20:5)+(i.policy==="Restrictive"?15:5);
impact=Math.min(impact,100);
let confidence=70-(i.liquidity==="Weak"?20:5);
let regime=impact<40?"Stable":impact<70?"Adjustment":"Repricing";
let signal=impact<30?"Weak":impact<60?"Building":"Strong";

let decision;
if(impact>75){
decision="Reduce duration (2Y), avoid long-end";
}else if(impact>50){
decision="Reduce duration (1Y), monitor supply";
}else{
decision="Neutral positioning";
}

return{impact,confidence,regime,signal,decision};
}

function drawTimeline(score){
let ctx=timeline.getContext("2d");
ctx.clearRect(0,0,500,200);

["orange","red","green"].forEach((c,i)=>{
ctx.strokeStyle=c;
ctx.beginPath();
for(let x=0;x<30;x++){
let adj=i===1?20:i===2?-15:0;
ctx.lineTo(x*16,200-((score+adj)*(x/30)));
}
ctx.stroke();
});
}

function drawCurve(score){
let ctx=curve.getContext("2d");
ctx.clearRect(0,0,500,200);
let base=[2,2.2,2.5,3,3.3];

["cyan","red"].forEach((c,i)=>{
ctx.strokeStyle=c;
ctx.beginPath();
base.forEach((v,x)=>{
let adj=i?20:0;
ctx.lineTo(x*100,200-(v+(score+adj)/80)*40);
});
ctx.stroke();
});
}

function run(){

let i={
spending:+spending.value,
inflation:inflation.value,
liquidity:liquidity.value,
policy:policy.value
};

let d=compute(i);

impact.innerText=Math.round(d.impact);
confidence.innerText=Math.round(d.confidence);
regime.innerText=d.regime;
signal.innerText=d.signal;
decision.innerText=d.decision;

drawTimeline(d.impact);
drawCurve(d.impact);

table.innerHTML=`
<tr><td>Supply</td><td>${d.impact>60?"High":"Moderate"}</td></tr>
<tr><td>Curve Steepness</td><td>${(d.impact/50).toFixed(2)}</td></tr>
`;

insight.innerHTML=`
<b>Insight:</b> Supply drives yields before inflation.<br>
<b>Positioning:</b> ${d.decision}
`;

if(pro){
proArea.classList.remove("lock");

analysis.innerHTML=`Market in ${d.regime} regime`;

riskDetails.innerHTML=`Volatility: ${d.impact>60?"High":"Moderate"}`;

scenarioDetails.innerHTML=`Stress: ${d.impact+20} | Mild: ${d.impact-15}`;
}

}

function shock(){
spending.value=Math.min(+spending.value+120,400);
inflation.value="High";
liquidity.value="Weak";
policy.value="Restrictive";
updateSlider();
run();
}

function upgrade(){
pro=true;
run();
}

function switchTab(id){
document.querySelectorAll(".tabContent").forEach(e=>e.classList.remove("active"));
document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"));
event.target.classList.add("active");
document.getElementById(id).classList.add("active");
}

updateSlider();
run();

</script>

</body>
</html>
