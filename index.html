<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BondStats Terminal Pro Elite - Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== BASE ===== */
body{
margin:0;
font-family:system-ui;
background:#040812;
color:#e2e8f0;
}

.container{
max-width:1600px;
margin:auto;
padding:25px;
}

h1{margin-bottom:20px;}

/* ===== LAYOUT ===== */

.grid{
display:grid;
grid-template-columns:420px 1fr;
gap:20px;
}

/* ===== PANEL ===== */

.panel{
background:#0f172a;
padding:20px;
border-radius:12px;
}

/* ===== INPUT ===== */

label{font-size:12px;color:#94a3b8;}

input,select{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:12px;
background:#1e293b;
border:none;
color:white;
}

button{
width:100%;
padding:12px;
background:#f97316;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:8px;
}

/* ===== METRICS ===== */

.metrics{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

.metric{
background:#020617;
padding:12px;
border-radius:8px;
}

.metric-title{font-size:11px;color:#94a3b8;}
.metric-value{font-size:20px;}

/* ===== CHARTS ===== */

.charts{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:15px;
}

canvas{
background:#020617;
border-radius:10px;
}

/* ===== TABLE ===== */

table{
width:100%;
margin-top:10px;
font-size:12px;
}

td{
padding:6px;
border-bottom:1px solid #1e293b;
}

/* ===== PRO LOCK ===== */

.lock{
opacity:0.2;
position:relative;
}

.lock::after{
content:"PRO";
position:absolute;
top:10px;
right:10px;
color:#f97316;
font-size:11px;
}

/* ===== NEW ===== */

.sliderValue{
float:right;
color:#f97316;
font-size:12px;
}

.tabs{
display:flex;
gap:10px;
margin:10px 0;
}

.tab{
padding:6px 10px;
background:#020617;
cursor:pointer;
font-size:12px;
}

.tab.active{
background:#f97316;
}

.tabContent{
display:none;
}

.tabContent.active{
display:block;
}

.premiumLive{
display:inline-block;
margin-bottom:14px;
padding:6px 10px;
border-radius:999px;
background:#0b2a1b;
color:#7ee2a8;
font-size:12px;
}

.sectionText{
margin-top:10px;
font-size:12px;
color:#94a3b8;
line-height:1.6;
}

</style>
</head>

<body>

<div class="container">

<h1>Defense Bond Impact Terminal</h1>
<div class="premiumLive">Premium Version Active</div>

<div class="grid">

<!-- LEFT PANEL -->

<div class="panel">

<label>Defense Spending <span id="spVal" class="sliderValue"></span></label>
<input type="range" id="spending" min="0" max="400" value="120" oninput="updateSlider()">

<label>Inflation</label>
<select id="inflation">
<option>Low</option>
<option selected>Moderate</option>
<option>High</option>
</select>

<label>Liquidity</label>
<select id="liquidity">
<option>Strong</option>
<option selected>Normal</option>
<option>Weak</option>
</select>

<label>Policy</label>
<select id="policy">
<option>Supportive</option>
<option selected>Neutral</option>
<option>Restrictive</option>
</select>

<button onclick="run()">Run Model</button>
<button onclick="shock()">Shock Scenario</button>
<button onclick="upgrade()">Premium Active</button>

<div class="sectionText">
This file is already unlocked. The Premium panels below are live.
</div>

</div>

<!-- RIGHT PANEL -->

<div class="panel">

<div class="metrics">
<div class="metric"><div class="metric-title">Impact</div><div id="impact"></div></div>
<div class="metric"><div class="metric-title">Confidence</div><div id="confidence"></div></div>
<div class="metric"><div class="metric-title">Regime</div><div id="regime"></div></div>
<div class="metric"><div class="metric-title">Signal</div><div id="signal"></div></div>
<div class="metric"><div class="metric-title">Decision</div><div id="decision"></div></div>
</div>

<div class="tabs">
<div class="tab active" onclick="switchTab(this,'overview')">Overview</div>
<div class="tab" onclick="switchTab(this,'curveTab')">Curve</div>
<div class="tab" onclick="switchTab(this,'riskTab')">Risk</div>
<div class="tab" onclick="switchTab(this,'scenarioTab')">Scenario</div>
</div>

<div id="overview" class="tabContent active">
<canvas id="timeline" width="500" height="200"></canvas>
</div>

<div id="curveTab" class="tabContent">
<canvas id="curve" width="500" height="200"></canvas>
</div>

<div id="riskTab" class="tabContent">
<div id="riskDetails" class="sectionText"></div>
</div>

<div id="scenarioTab" class="tabContent">
<div id="scenarioDetails" class="sectionText"></div>
</div>

<!-- ORIGINAL CHARTS (NOT REMOVED) -->

<div class="charts">
<canvas id="factors" width="500" height="200"></canvas>
<canvas id="compareChart" width="500" height="200"></canvas>
</div>

<table id="table"></table>

<div id="insight" class="sectionText"></div>

<div id="proArea">
<h3>Advanced Analysis</h3>
<div id="analysis" class="sectionText"></div>
<div id="risk" class="sectionText"></div>
<div id="compare" class="sectionText"></div>

<h3>Liquidity Stress Monitor</h3>
<div id="liquidityStress" class="sectionText"></div>

<h3>Auction Pressure Model</h3>
<div id="auctionPressure" class="sectionText"></div>

</div>

</div>

</div>

</div>

<script>

let pro=true;

/* ===== NEW ===== */

function updateSlider(){
spVal.innerText = spending.value + " bn";
}

function switchTab(tabEl,id){
document.querySelectorAll(".tabContent").forEach(c=>c.classList.remove("active"));
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
tabEl.classList.add("active");
document.getElementById(id).classList.add("active");
}

/* ===== MODEL ===== */

function compute(i){

let impact =
i.spending*0.2 +
(i.inflation==="High"?25:10) +
(i.liquidity==="Weak"?20:5) +
(i.policy==="Restrictive"?15:5);

impact=Math.min(impact,100);

let confidence=70-(i.liquidity==="Weak"?20:5);

let regime=impact<40?"Stable":impact<70?"Adjustment":"Repricing";

let signal=impact<30?"Weak":impact<60?"Building":"Strong";

/* IMPROVED DECISION */

let decision;
if(impact>75){
decision="Reduce duration (2Y), avoid long-end, hedge";
}else if(impact>50){
decision="Reduce duration (1Y), monitor auctions";
}else{
decision="Neutral positioning";
}

return {impact,confidence,regime,signal,decision};

}

/* ===== PREMIUM ENGINES ===== */

function liquidityStressModel(i,score){

let baseStress = 0;

if(i.liquidity==="Weak"){ baseStress += 40; }
else if(i.liquidity==="Normal"){ baseStress += 20; }
else{ baseStress += 5; }

if(i.policy==="Restrictive"){ baseStress += 30; }
else if(i.policy==="Neutral"){ baseStress += 15; }
else{ baseStress += 5; }

if(i.inflation==="High"){ baseStress += 10; }
else if(i.inflation==="Moderate"){ baseStress += 5; }

let dynamic = score / 5;

let total = baseStress + dynamic;

return Math.min(Math.round(total),100);

}

function auctionPressureModel(i,score){

let pressure = 0;

pressure += i.spending * 0.1;

if(i.inflation==="High"){ pressure += 30; }
else if(i.inflation==="Moderate"){ pressure += 15; }
else{ pressure += 5; }

if(i.policy==="Restrictive"){ pressure += 10; }

pressure += score / 4;

return Math.min(Math.round(pressure),100);

}

function liquidityBreakdown(i,score){
return {
funding:(score/2).toFixed(0),
dealer:i.liquidity==="Weak"?"Stressed":"Stable",
system:score>70?"Fragile":"Normal",
fragilityScore: Math.min(Math.round(score*0.9),100)
};
}

function auctionBreakdown(i,score){
return {
front:(score/3).toFixed(1),
belly:(score/2).toFixed(1),
long:(score/1.5).toFixed(1),
issuance: (i.spending*0.12).toFixed(1)
};
}

function yieldSim(score){
return {
front:(2+score/100).toFixed(2),
long:(3+score/80).toFixed(2),
shape:score>60?"Steepening":"Flattening"
};
}

function positioning(score){
if(score>75)return"Short duration, avoid long-end";
if(score>50)return"Reduce duration, focus belly";
return"Neutral positioning";
}

/* ===== ORIGINAL CHARTS ===== */

function drawTimeline(score){

let ctx=timeline.getContext("2d");
ctx.clearRect(0,0,500,200);

/* Base */
ctx.strokeStyle="orange";
ctx.lineWidth=2;
ctx.beginPath();

for(let i=0;i<30;i++){
let x = i*16;
let y = 200-(score*(i/30))*1.5;
if(i===0){ ctx.moveTo(x,y); } else { ctx.lineTo(x,y); }
}
ctx.stroke();

/* Stress */
ctx.strokeStyle="red";
ctx.beginPath();
for(let i=0;i<30;i++){
let x = i*16;
let y = 200-((score+20)*(i/30))*1.5;
if(i===0){ ctx.moveTo(x,y); } else { ctx.lineTo(x,y); }
}
ctx.stroke();

}

function drawCurve(score){

let ctx=curve.getContext("2d");
ctx.clearRect(0,0,500,200);

let base=[2,2.2,2.5,3,3.3];

/* Base */
ctx.strokeStyle="cyan";
ctx.lineWidth=2;
ctx.beginPath();

base.forEach((v,i)=>{
let x = i*100;
let y = 200-(v+score/80)*40;
if(i===0){ ctx.moveTo(x,y); } else { ctx.lineTo(x,y); }
});

ctx.stroke();

/* Stress */
ctx.strokeStyle="red";
ctx.beginPath();

base.forEach((v,i)=>{
let x = i*100;
let y = 200-(v+(score+20)/80)*40;
if(i===0){ ctx.moveTo(x,y); } else { ctx.lineTo(x,y); }
});

ctx.stroke();

}

function drawFactors(score){

let ctx=factors.getContext("2d");
ctx.clearRect(0,0,500,200);

let vals=[score,score*0.8,score*0.6,score*0.5];
let labels=["Supply","Infl.","Liq.","Vol."];

vals.forEach((v,i)=>{
ctx.fillStyle="orange";
ctx.fillRect(i*100+15,200-v*1.5,55,v*1.5);

ctx.fillStyle="#94a3b8";
ctx.font="12px system-ui";
ctx.fillText(labels[i],i*100+15,192);
});

}

function drawCompare(score){

let ctx=compareChart.getContext("2d");
ctx.clearRect(0,0,500,200);

/* Base */
ctx.strokeStyle="orange";
ctx.lineWidth=2;
ctx.beginPath();

for(let i=0;i<20;i++){
let x = i*20;
let y = 200-(score*(i/20));
if(i===0){ ctx.moveTo(x,y); } else { ctx.lineTo(x,y); }
}
ctx.stroke();

/* Mild */
ctx.strokeStyle="green";
ctx.beginPath();
for(let i=0;i<20;i++){
let x = i*20;
let y = 200-((Math.max(score-15,0))*(i/20));
if(i===0){ ctx.moveTo(x,y); } else { ctx.lineTo(x,y); }
}
ctx.stroke();

}

/* ===== TABLE ===== */

function buildTable(score){

table.innerHTML=`
<tr><td>Supply</td><td>${score>60?"High":"Moderate"}</td></tr>
<tr><td>Inflation</td><td>${score>50?"Elevated":"Contained"}</td></tr>
<tr><td>Volatility</td><td>${score>60?"High":"Moderate"}</td></tr>
<tr><td>Yield Shift</td><td>+${(score/10).toFixed(2)}%</td></tr>
<tr><td>Curve Slope</td><td>${(score/50).toFixed(2)}</td></tr>
`;

}

/* ===== RUN ===== */

function run(){

let i={
spending:+spending.value,
inflation:inflation.value,
liquidity:liquidity.value,
policy:policy.value
};

let d=compute(i);

impact.innerText=Math.round(d.impact);
confidence.innerText=Math.round(d.confidence);
regime.innerText=d.regime;
signal.innerText=d.signal;
decision.innerText=d.decision;

drawTimeline(d.impact);
drawCurve(d.impact);
drawFactors(d.impact);
drawCompare(d.impact);
buildTable(d.impact);

/* INSIGHT */

insight.innerHTML=`
<b>Market Insight:</b><br>
Supply drives yields before inflation.<br><br>
<b>Positioning:</b> ${d.decision}
`;

/* PREMIUM CONTENT ALWAYS ACTIVE */

let lb = liquidityBreakdown(i,d.impact);
let ab = auctionBreakdown(i,d.impact);
let y = yieldSim(d.impact);
let stressScore = liquidityStressModel(i,d.impact);
let auctionScore = auctionPressureModel(i,d.impact);

analysis.innerHTML=`
Market regime: ${d.regime}<br>
Forward outlook: ${d.impact>60?"Aggressive repricing":"Gradual adjustment"}<br>
Positioning Engine: ${positioning(d.impact)}
`;

risk.innerHTML=`
Volatility: ${d.impact>60?"High":"Moderate"}<br>
Liquidity: ${i.liquidity}<br>
System Stability: ${lb.system}<br>
Fragility Score: ${lb.fragilityScore}
`;

compare.innerHTML=`
Stress: ${Math.min(d.impact+20,100)}<br>
Mild: ${Math.max(d.impact-15,0)}<br>
Curve Shape: ${y.shape}<br>
Front-End Yield: ${y.front}%<br>
Long-End Yield: ${y.long}%
`;

liquidityStress.innerHTML=`
Stress Score: ${stressScore}<br>
Funding Pressure: ${stressScore>60?"High":"Moderate"}<br>
Funding Value: ${lb.funding}<br>
Dealer Balance: ${lb.dealer}<br>
System Risk: ${lb.system}
`;

auctionPressure.innerHTML=`
Auction Pressure: ${auctionScore}<br>
Expected Issuance: ${ab.issuance}<br>
Front-End Impact: ${ab.front}<br>
Belly Impact: ${ab.belly}<br>
Long-End Impact: ${ab.long}<br>
Yield Impact: +${(auctionScore/10).toFixed(2)}%
`;

riskDetails.innerHTML = `
<b>Risk Details</b><br>
Duration Risk: ${d.impact>60?"High":"Moderate"}<br>
Liquidity Pressure: ${i.liquidity}<br>
Yield Curve Shape: ${y.shape}<br>
Funding Stress: ${stressScore}
`;

scenarioDetails.innerHTML = `
<b>Scenario Details</b><br>
Base: ${d.impact}<br>
Stress: ${Math.min(d.impact+20,100)}<br>
Mild: ${Math.max(d.impact-15,0)}<br>
Front-End Yield: ${y.front}%<br>
Long-End Yield: ${y.long}%<br>
Auction Score: ${auctionScore}
`;

}

/* ===== SHOCK ===== */

function shock(){
spending.value=Math.min(+spending.value+120,400);
inflation.value="High";
liquidity.value="Weak";
policy.value="Restrictive";
updateSlider();
run();
}

/* ===== UPGRADE ===== */

function upgrade(){
pro=true;
run();
}

/* INIT */

updateSlider();
run();

</script>

</body>
</html>
