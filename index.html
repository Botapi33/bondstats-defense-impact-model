<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BondStats Terminal Pro Elite</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== BASE ===== */
body{
margin:0;
font-family:system-ui;
background:#040812;
color:#e2e8f0;
}

.container{
max-width:1600px;
margin:auto;
padding:25px;
}

h1{margin-bottom:20px;}

/* ===== LAYOUT ===== */

.grid{
display:grid;
grid-template-columns:420px 1fr;
gap:20px;
}

/* ===== PANEL ===== */

.panel{
background:#0f172a;
padding:20px;
border-radius:12px;
}

/* ===== INPUT ===== */

label{font-size:12px;color:#94a3b8;}

input,select{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:12px;
background:#1e293b;
border:none;
color:white;
}

button{
width:100%;
padding:12px;
background:#f97316;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:8px;
}

/* ===== METRICS ===== */

.metrics{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

.metric{
background:#020617;
padding:12px;
border-radius:8px;
}

.metric-title{font-size:11px;color:#94a3b8;}
.metric-value{font-size:20px;}

/* ===== CHARTS ===== */

.charts{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:15px;
}

canvas{
background:#020617;
border-radius:10px;
}

/* ===== TABLE ===== */

table{
width:100%;
margin-top:10px;
font-size:12px;
}

td{
padding:6px;
border-bottom:1px solid #1e293b;
}

/* ===== PRO LOCK ===== */

.lock{
opacity:0.2;
position:relative;
}

.lock::after{
content:"PRO";
position:absolute;
top:10px;
right:10px;
color:#f97316;
font-size:11px;
}

/* ===== NEW ===== */

.sliderValue{
float:right;
color:#f97316;
font-size:12px;
}

.tabs{
display:flex;
gap:10px;
margin:10px 0;
}

.tab{
padding:6px 10px;
background:#020617;
cursor:pointer;
font-size:12px;
}

.tab.active{
background:#f97316;
}

.tabContent{
display:none;
}

.tabContent.active{
display:block;
}

</style>
</head>

<body>

<div class="container">

<h1>Defense Bond Impact Terminal</h1>

<div class="grid">

<div class="panel">

<label>Defense Spending <span id="spVal" class="sliderValue"></span></label>
<input type="range" id="spending" min="0" max="400" value="120" oninput="updateSlider()">

<label>Inflation</label>
<select id="inflation">
<option>Low</option>
<option selected>Moderate</option>
<option>High</option>
</select>

<label>Liquidity</label>
<select id="liquidity">
<option>Strong</option>
<option selected>Normal</option>
<option>Weak</option>
</select>

<label>Policy</label>
<select id="policy">
<option>Supportive</option>
<option selected>Neutral</option>
<option>Restrictive</option>
</select>

<button onclick="run()">Run Model</button>
<button onclick="shock()">Shock Scenario</button>
<button onclick="upgrade()">Unlock Pro</button>

</div>

<div class="panel">

<div class="metrics">
<div class="metric"><div class="metric-title">Impact</div><div id="impact"></div></div>
<div class="metric"><div class="metric-title">Confidence</div><div id="confidence"></div></div>
<div class="metric"><div class="metric-title">Regime</div><div id="regime"></div></div>
<div class="metric"><div class="metric-title">Signal</div><div id="signal"></div></div>
<div class="metric"><div class="metric-title">Decision</div><div id="decision"></div></div>
</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('overview')">Overview</div>
<div class="tab" onclick="switchTab('curveTab')">Curve</div>
<div class="tab" onclick="switchTab('riskTab')">Risk</div>
<div class="tab" onclick="switchTab('scenarioTab')">Scenario</div>
</div>

<div id="overview" class="tabContent active">
<canvas id="timeline" width="500" height="200"></canvas>
</div>

<div id="curveTab" class="tabContent">
<canvas id="curve" width="500" height="200"></canvas>
</div>

<div id="riskTab" class="tabContent">
<div id="riskDetails"></div>
</div>

<div id="scenarioTab" class="tabContent">
<div id="scenarioDetails"></div>
</div>

<div class="charts">
<canvas id="factors" width="500" height="200"></canvas>
<canvas id="compareChart" width="500" height="200"></canvas>
</div>

<table id="table"></table>
<div id="insight"></div>

<div id="proArea">
<h3>Advanced Analysis</h3>
<div id="analysis"></div>
<div id="risk"></div>
<div id="compare"></div>

<h3>Liquidity Stress Monitor</h3>
<div id="liquidityStress"></div>

<h3>Auction Pressure Model</h3>
<div id="auctionPressure"></div>

</div>

</div>

</div>

</div>

<script>

let pro=true;

/* ===== ORIGINAL CODE BLEIBT UNVERÄNDERT ===== */

/* (Hier bleibt ALLES was du hattest exakt gleich – bewusst nicht nochmal gekürzt dargestellt) */


/* ===== PREMIUM EXTENSION ===== */

function liquidityBreakdown(i,score){
return {
funding:(score/2).toFixed(0),
dealer:i.liquidity==="Weak"?"Stressed":"Stable",
system:score>70?"Fragile":"Normal"
};
}

function auctionBreakdown(i,score){
return {
front:(score/3).toFixed(1),
belly:(score/2).toFixed(1),
long:(score/1.5).toFixed(1)
};
}

function yieldSim(score){
return {
front:(2+score/100).toFixed(2),
long:(3+score/80).toFixed(2),
shape:score>60?"Steepening":"Flattening"
};
}

function positioning(score){
if(score>75)return"Short duration, avoid long-end";
if(score>50)return"Reduce duration, focus belly";
return"Neutral positioning";
}

/* ===== EXTEND RUN ===== */

const originalRun = run;

run = function(){

originalRun();

let i={
spending:+spending.value,
inflation:inflation.value,
liquidity:liquidity.value,
policy:policy.value
};

let d=compute(i);

/* ===== PREMIUM OUTPUT ===== */

let lb = liquidityBreakdown(i,d.impact);
let ab = auctionBreakdown(i,d.impact);
let y = yieldSim(d.impact);

liquidityStress.innerHTML=`
Stress Score: ${d.impact}<br>
Funding: ${lb.funding}<br>
Dealer: ${lb.dealer}<br>
System: ${lb.system}
`;

auctionPressure.innerHTML=`
Front: ${ab.front}<br>
Belly: ${ab.belly}<br>
Long: ${ab.long}<br>
Yield: +${(d.impact/10).toFixed(2)}%
`;

compare.innerHTML += `
<br><br><b>Yield Curve Sim:</b><br>
Front: ${y.front}%<br>
Long: ${y.long}%<br>
Shape: ${y.shape}
`;

analysis.innerHTML += `
<br><br><b>Positioning:</b><br>
${positioning(d.impact)}
`;

};

updateSlider();
run();

</script>

</body>
</html>
