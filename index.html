<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BondStats Terminal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:system-ui;
background:#050a16;
color:#e2e8f0;
}

.container{
max-width:1600px;
margin:auto;
padding:20px;
}

/* ===== GRID ===== */

.layout{
display:grid;
grid-template-columns:420px 1fr;
gap:20px;
}

.panel{
background:#0f172a;
padding:20px;
border-radius:10px;
}

/* ===== INPUT ===== */

label{
font-size:12px;
color:#94a3b8;
}

input,select{
width:100%;
margin-top:8px;
margin-bottom:12px;
padding:10px;
background:#1e293b;
border:none;
color:white;
}

button{
width:100%;
padding:12px;
background:#f97316;
border:none;
color:white;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

/* ===== METRICS ===== */

.metrics{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:10px;
}

.metric{
background:#020617;
padding:12px;
border-radius:8px;
}

.metric-title{
font-size:11px;
color:#94a3b8;
}

.metric-value{
font-size:20px;
}

/* ===== GRID OUTPUT ===== */

.output-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

/* ===== CANVAS ===== */

canvas{
background:#020617;
border-radius:10px;
}

/* ===== TABLE ===== */

table{
width:100%;
font-size:12px;
}

td{
padding:6px;
border-bottom:1px solid #1e293b;
}

/* ===== LOCK ===== */

.lock{
opacity:0.3;
}

/* ===== TABS ===== */

.tabs{
display:flex;
gap:10px;
margin-top:10px;
}

.tab{
padding:8px 12px;
background:#1e293b;
cursor:pointer;
}

.active{
background:#f97316;
}

</style>
</head>

<body>

<div class="container">

<h1>Defense Bond Impact Terminal</h1>

<div class="layout">

<!-- INPUT -->

<div class="panel">

<label>Defense Spending</label>
<input type="range" id="spending" min="0" max="400" value="120">

<label>Inflation</label>
<select id="inflation">
<option>Low</option>
<option selected>Moderate</option>
<option>High</option>
</select>

<label>Liquidity</label>
<select id="liquidity">
<option>Strong</option>
<option selected>Normal</option>
<option>Weak</option>
</select>

<label>Policy</label>
<select id="policy">
<option>Supportive</option>
<option selected>Neutral</option>
<option>Restrictive</option>
</select>

<button onclick="run()">Run</button>
<button onclick="shock()">Shock</button>

</div>

<!-- OUTPUT -->

<div class="panel">

<div class="metrics">
<div class="metric"><div class="metric-title">Impact</div><div id="impact" class="metric-value"></div></div>
<div class="metric"><div class="metric-title">Confidence</div><div id="confidence" class="metric-value"></div></div>
<div class="metric"><div class="metric-title">Regime</div><div id="regime" class="metric-value"></div></div>
<div class="metric"><div class="metric-title">Signal</div><div id="signal" class="metric-value"></div></div>
</div>

<div class="output-grid">

<canvas id="timeline" width="600" height="200"></canvas>
<canvas id="curve" width="600" height="200"></canvas>

<canvas id="factors" width="600" height="200"></canvas>

<div>
<table id="table"></table>
</div>

</div>

<div class="tabs">
<div class="tab active" onclick="tab('narrative')">Narrative</div>
<div class="tab" onclick="tab('risk')">Risk</div>
<div class="tab" onclick="tab('compare')">Compare</div>
</div>

<div id="narrative"></div>
<div id="risk" style="display:none"></div>
<div id="compare" style="display:none"></div>

</div>

</div>

</div>

<script>

/* ===== MODEL ===== */

function compute(i){

let impact =
i.spending*0.18 +
(i.inflation==="High"?25:10) +
(i.liquidity==="Weak"?20:5) +
(i.policy==="Restrictive"?15:5);

impact=Math.min(impact,100);

let confidence=70-(i.liquidity==="Weak"?15:5);

let regime=impact<40?"Stable":impact<70?"Adjustment":"Repricing";
let signal=impact<30?"Weak":impact<60?"Building":"Strong";

return {impact,confidence,regime,signal};

}

/* ===== TIMELINE ===== */

function timeline(score){

let ctx=timelineCanvas.getContext("2d");
ctx.clearRect(0,0,600,200);

ctx.strokeStyle="orange";
ctx.beginPath();

for(let i=0;i<20;i++){
let val=score*(i/20);
ctx.lineTo(i*30,200-val*1.5);
}

ctx.stroke();

}

/* ===== CURVE ===== */

function curve(score){

let ctx=curveCanvas.getContext("2d");
ctx.clearRect(0,0,600,200);

let base=[2,2.2,2.5,3,3.3];
let adjusted=base.map(x=>x+score/100);

ctx.strokeStyle="cyan";
ctx.beginPath();

adjusted.forEach((v,i)=>{
ctx.lineTo(i*120,200-v*40);
});

ctx.stroke();

}

/* ===== FACTORS ===== */

function factors(score){

let ctx=factorsCanvas.getContext("2d");
ctx.clearRect(0,0,600,200);

let vals=[score,score*0.8,score*0.6,score*0.5];
vals.forEach((v,i)=>{
ctx.fillStyle="orange";
ctx.fillRect(i*120,200-v*1.5,50,v*1.5);
});

}

/* ===== TABLE ===== */

function table(score){

table.innerHTML=`
<tr><td>Supply</td><td>${score>60?"High":"Moderate"}</td></tr>
<tr><td>Inflation</td><td>${score>50?"Elevated":"Contained"}</td></tr>
<tr><td>Liquidity</td><td>${score>60?"Weak":"Normal"}</td></tr>
<tr><td>Volatility</td><td>${score>60?"High":"Moderate"}</td></tr>
`;

}

/* ===== RUN ===== */

function run(){

let i={
spending:+spending.value,
inflation:inflation.value,
liquidity:liquidity.value,
policy:policy.value
};

let d=compute(i);

impact.innerText=Math.round(d.impact);
confidence.innerText=Math.round(d.confidence);
regime.innerText=d.regime;
signal.innerText=d.signal;

timeline(d.impact);
curve(d.impact);
factors(d.impact);
table(d.impact);

/* Narrative */

narrative.innerHTML=`Market entering ${d.regime} phase with ${d.signal} signal.`;

/* Risk */

risk.innerHTML=`Volatility ${d.impact>60?"High":"Moderate"}`;

/* Compare */

compare.innerHTML=`Base ${d.impact} | Stress ${d.impact+20}`;

}

/* ===== SHOCK ===== */

function shock(){
spending.value=Math.min(+spending.value+100,400);
inflation.value="High";
liquidity.value="Weak";
policy.value="Restrictive";
run();
}

/* ===== TAB ===== */

function tab(name){
["narrative","risk","compare"].forEach(id=>{
document.getElementById(id).style.display="none";
});
document.getElementById(name).style.display="block";
event.target.classList.add("active");
}

run();

</script>

</body>
</html>
