<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BondStats Terminal Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:system-ui;
background:#050a16;
color:#e2e8f0;
}

.container{
max-width:1600px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:420px 1fr;
gap:20px;
}

.panel{
background:#0f172a;
padding:20px;
border-radius:10px;
}

h1{
margin-bottom:20px;
}

label{
font-size:12px;
color:#94a3b8;
}

input,select{
width:100%;
margin-top:8px;
margin-bottom:12px;
padding:10px;
background:#1e293b;
border:none;
color:white;
}

button{
width:100%;
padding:12px;
background:#f97316;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:8px;
}

/* METRICS */

.metrics{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:10px;
}

.metric{
background:#020617;
padding:12px;
border-radius:8px;
}

.metric-title{
font-size:11px;
color:#94a3b8;
}

.metric-value{
font-size:20px;
}

/* LOCK */

.lock{
opacity:0.2;
position:relative;
}

.lock::after{
content:"PRO";
position:absolute;
top:5px;
right:8px;
font-size:10px;
color:#f97316;
}

/* CHART */

canvas{
background:#020617;
border-radius:10px;
margin-top:10px;
}

/* BUTTON */

.upgrade{
background:#2563eb;
}

</style>
</head>

<body>

<div class="container">

<h1>Defense Bond Impact Model – Terminal Pro</h1>

<div class="grid">

<!-- INPUT -->

<div class="panel">

<label>Defense Spending</label>
<input type="range" id="spending" min="0" max="400" value="120">

<label>Inflation</label>
<select id="inflation">
<option>Low</option>
<option selected>Moderate</option>
<option>High</option>
</select>

<label>Liquidity</label>
<select id="liquidity">
<option>Strong</option>
<option selected>Normal</option>
<option>Weak</option>
</select>

<label>Policy</label>
<select id="policy">
<option>Supportive</option>
<option selected>Neutral</option>
<option>Restrictive</option>
</select>

<button onclick="run()">Run Model</button>
<button onclick="shock()">Shock Scenario</button>
<button class="upgrade" onclick="upgrade()">Upgrade to Pro</button>

</div>

<!-- OUTPUT -->

<div class="panel">

<div class="metrics">
<div class="metric"><div class="metric-title">Impact</div><div id="impact"></div></div>
<div class="metric"><div class="metric-title">Confidence</div><div id="confidence"></div></div>
<div class="metric"><div class="metric-title">Regime</div><div id="regime"></div></div>
<div class="metric"><div class="metric-title">Decision</div><div id="decision"></div></div>
</div>

<canvas id="chart" width="800" height="200"></canvas>

<!-- PRO BLOCK -->

<div id="proArea" class="lock">

<h3>Advanced Analysis</h3>

<div id="analysis"></div>
<div id="risk"></div>
<div id="compare"></div>

</div>

</div>

</div>

</div>

<script>

let pro=false;

/* MODEL */

function calc(i){

let impact =
i.spending*0.2 +
(i.inflation==="High"?25:10) +
(i.liquidity==="Weak"?20:5) +
(i.policy==="Restrictive"?15:5);

impact=Math.min(impact,100);

let confidence=70-(i.liquidity==="Weak"?20:5);

let regime=impact<40?"Stable":impact<70?"Adjustment":"Repricing";

let decision =
impact>70?"Reduce Duration":
impact>40?"Hedge Risk":
"Hold";

return {impact,confidence,regime,decision};

}

/* CHART */

function draw(score){

let ctx=chart.getContext("2d");
ctx.clearRect(0,0,800,200);

ctx.strokeStyle="orange";
ctx.beginPath();

for(let i=0;i<20;i++){
let y=200-(score*(i/20))*1.5;
ctx.lineTo(i*40,y);
}

ctx.stroke();

}

/* RUN */

function run(){

let i={
spending:+spending.value,
inflation:inflation.value,
liquidity:liquidity.value,
policy:policy.value
};

let d=calc(i);

impact.innerText=Math.round(d.impact);
confidence.innerText=Math.round(d.confidence);
regime.innerText=d.regime;
decision.innerText=d.decision;

draw(d.impact);

/* PRO */

if(pro){

analysis.innerHTML=`Markets show ${d.regime} dynamics driven by fiscal expansion.`;

risk.innerHTML=`Volatility ${d.impact>60?"High":"Moderate"}`;

compare.innerHTML=`Base ${d.impact} | Stress ${d.impact+20}`;

}

}

/* SHOCK */

function shock(){
spending.value=Math.min(+spending.value+100,400);
inflation.value="High";
liquidity.value="Weak";
policy.value="Restrictive";
run();
}

/* UPGRADE */

function upgrade(){
pro=true;
proArea.classList.remove("lock");
run();
alert("Pro Activated (connect payment)");
}

run();

</script>

</body>
</html>
