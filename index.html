<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BondStats Terminal Pro Elite</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ================= BASE ================= */

body{
margin:0;
font-family:system-ui;
background:#040812;
color:#e2e8f0;
}

.container{
max-width:1700px;
margin:auto;
padding:25px;
}

/* ================= GRID ================= */

.grid{
display:grid;
grid-template-columns:420px 1fr;
gap:20px;
}

.panel{
background:#0f172a;
padding:20px;
border-radius:12px;
}

/* ================= INPUT ================= */

label{font-size:12px;color:#94a3b8;}

input,select{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:12px;
background:#1e293b;
border:none;
color:white;
}

button{
width:100%;
padding:12px;
background:#f97316;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:8px;
}

/* ================= METRICS ================= */

.metrics{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}

.metric{
background:#020617;
padding:12px;
border-radius:8px;
}

.metric-title{
font-size:11px;
color:#94a3b8;
}

.metric-value{
font-size:20px;
}

/* ================= CHARTS ================= */

canvas{
background:#020617;
border-radius:10px;
margin-top:15px;
width:100%;
}

/* ================= TABLE ================= */

table{
width:100%;
margin-top:10px;
font-size:12px;
}

td{
padding:6px;
border-bottom:1px solid #1e293b;
}

/* ================= PRO ================= */

.lock{
opacity:0.2;
position:relative;
}

.lock::after{
content:"PRO";
position:absolute;
top:10px;
right:10px;
color:#f97316;
}

/* ================= EXTRA ================= */

.sliderValue{
float:right;
color:#f97316;
font-size:12px;
}

.section{
margin-top:15px;
font-size:13px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="container">

<h1>Defense Bond Impact Terminal</h1>

<div class="grid">

<!-- LEFT -->

<div class="panel">

<label>Defense Spending <span id="spVal" class="sliderValue"></span></label>
<input type="range" id="spending" min="0" max="400" value="120" oninput="updateSlider()">

<label>Inflation</label>
<select id="inflation">
<option>Low</option>
<option selected>Moderate</option>
<option>High</option>
</select>

<label>Liquidity</label>
<select id="liquidity">
<option>Strong</option>
<option selected>Normal</option>
<option>Weak</option>
</select>

<label>Policy</label>
<select id="policy">
<option>Supportive</option>
<option selected>Neutral</option>
<option>Restrictive</option>
</select>

<button onclick="run()">Run Model</button>
<button onclick="shock()">Shock Scenario</button>
<button onclick="upgrade()">Unlock Pro</button>

</div>

<!-- RIGHT -->

<div class="panel">

<div class="metrics">
<div class="metric"><div class="metric-title">Impact</div><div id="impact"></div></div>
<div class="metric"><div class="metric-title">Confidence</div><div id="confidence"></div></div>
<div class="metric"><div class="metric-title">Regime</div><div id="regime"></div></div>
<div class="metric"><div class="metric-title">Signal</div><div id="signal"></div></div>
<div class="metric"><div class="metric-title">Decision</div><div id="decision"></div></div>
</div>

<canvas id="mainChart" height="250"></canvas>
<canvas id="curveChart" height="250"></canvas>

<table id="table"></table>

<div id="insight" class="section"></div>

<div id="proArea" class="lock">

<h3>Advanced Analysis</h3>
<div id="analysis"></div>

<h3>Risk Breakdown</h3>
<div id="risk"></div>

<h3>Scenario Engine</h3>
<div id="compare"></div>

<h3>Duration Strategy</h3>
<div id="duration"></div>

<h3>Yield Forecast</h3>
<div id="forecast"></div>

<h3>Market Positioning</h3>
<div id="positioning"></div>

</div>

</div>

</div>

</div>

<script>

/* ================= STATE ================= */

let pro=false;

/* ================= UI ================= */

function updateSlider(){
spVal.innerText = spending.value + " bn";
}

/* ================= MODEL ================= */

function compute(i){

let base = i.spending*0.2;
let inflation = i.inflation==="High"?25:10;
let liquidity = i.liquidity==="Weak"?20:5;
let policy = i.policy==="Restrictive"?15:5;

let impact = base + inflation + liquidity + policy;
impact=Math.min(impact,100);

let confidence=70-(i.liquidity==="Weak"?20:5);

let regime=
impact<40?"Stable":
impact<70?"Adjustment":
"Repricing";

let signal=
impact<30?"Weak":
impact<60?"Building":
"Strong";

/* ADVANCED DECISION */

let decision;

if(impact>75){
decision="Reduce duration 2Y, avoid 30Y, hedge aggressively";
}
else if(impact>50){
decision="Reduce duration 1Y, focus 2–10Y";
}
else{
decision="Neutral stance";
}

return {impact,confidence,regime,signal,decision};

}

/* ================= CHARTS ================= */

function drawMainChart(score){

let ctx=mainChart.getContext("2d");
ctx.clearRect(0,0,1200,300);

["orange","red","green"].forEach((c,i)=>{
ctx.strokeStyle=c;
ctx.beginPath();

for(let x=0;x<50;x++){
let adj=i===1?20:i===2?-15:0;
ctx.lineTo(x*20,300-((score+adj)*(x/50))*2);
}

ctx.stroke();
});

}

function drawCurveChart(score){

let ctx=curveChart.getContext("2d");
ctx.clearRect(0,0,1200,300);

let base=[2,2.2,2.5,3,3.3];

["cyan","red"].forEach((c,i)=>{
ctx.strokeStyle=c;
ctx.beginPath();

base.forEach((v,x)=>{
let adj=i?20:0;
ctx.lineTo(x*250,300-(v+(score+adj)/80)*70);
});

ctx.stroke();
});

}

/* ================= RUN ================= */

function run(){

let i={
spending:+spending.value,
inflation:inflation.value,
liquidity:liquidity.value,
policy:policy.value
};

let d=compute(i);

/* METRICS */

impact.innerText=Math.round(d.impact);
confidence.innerText=Math.round(d.confidence);
regime.innerText=d.regime;
signal.innerText=d.signal;
decision.innerText=d.decision;

/* CHARTS */

drawMainChart(d.impact);
drawCurveChart(d.impact);

/* TABLE */

table.innerHTML=`
<tr><td>Supply</td><td>${d.impact>60?"High":"Moderate"}</td></tr>
<tr><td>Yield Shift</td><td>+${(d.impact/10).toFixed(2)}%</td></tr>
<tr><td>Curve Slope</td><td>${(d.impact/50).toFixed(2)}</td></tr>
<tr><td>Duration Risk</td><td>${d.impact>60?"High":"Moderate"}</td></tr>
`;

/* INSIGHT */

insight.innerHTML=`
Markets are pricing fiscal expansion through bond issuance.
Yields react before inflation materializes.
`;

/* ================= PRO ================= */

if(pro){

proArea.classList.remove("lock");

/* ANALYSIS */

analysis.innerHTML=`
Market Phase: ${d.regime}<br>
Primary Driver: Fiscal expansion<br>
Outlook: ${d.impact>60?"Aggressive repricing":"Gradual shift"}
`;

/* RISK */

risk.innerHTML=`
Volatility: ${d.impact>60?"High":"Moderate"}<br>
Liquidity Stress: ${i.liquidity}<br>
Term Premium: ${d.impact>60?"Rising":"Stable"}
`;

/* SCENARIOS */

compare.innerHTML=`
Base: ${d.impact}<br>
Stress: ${d.impact+20}<br>
Mild: ${d.impact-15}
`;

/* DURATION STRATEGY */

duration.innerHTML=`
${d.impact>60?
"Reduce duration aggressively, avoid long-end bonds":
"Maintain balanced duration"}
`;

/* FORECAST */

forecast.innerHTML=`
Base Yield: +${(d.impact/10).toFixed(2)}%<br>
Stress Yield: +${((d.impact+20)/10).toFixed(2)}%
`;

/* POSITIONING */

positioning.innerHTML=`
${d.impact>60?
"Defensive positioning required":
"Neutral positioning"}
`;

}

}

/* ================= ACTIONS ================= */

function shock(){
spending.value=Math.min(+spending.value+120,400);
inflation.value="High";
liquidity.value="Weak";
policy.value="Restrictive";
updateSlider();
run();
}

function upgrade(){
pro=true;
run();
}

/* INIT */

updateSlider();
run();

</script>

</body>
</html>
