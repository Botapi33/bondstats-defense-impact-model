<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Defense Bond Impact Model</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:#0a0f1c;
  color:#e5e7eb;
}

.container{
  max-width:1300px;
  margin:auto;
  padding:40px;
}

h1{
  font-size:38px;
  margin-bottom:10px;
}

.subtitle{
  color:#9ca3af;
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1.2fr;
  gap:30px;
}

.card{
  background:#111827;
  padding:20px;
  border-radius:12px;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#1f2937;
  border:none;
  color:white;
}

button{
  margin-top:20px;
  padding:14px;
  width:100%;
  background:#f97316;
  border:none;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.tabs{
  display:flex;
  gap:10px;
  margin-top:20px;
}

.tab{
  padding:10px;
  background:#1f2937;
  cursor:pointer;
  border-radius:6px;
}

.active{
  background:#f97316;
}

.section{
  margin-top:20px;
}

.metric{
  margin-bottom:10px;
}

.locked{
  opacity:0.3;
}

.upgrade{
  margin-top:20px;
  padding:15px;
  background:#1f2937;
  border-radius:8px;
  text-align:center;
}

.upgrade button{
  background:#10b981;
}
</style>

</head>

<body>

<div class="container">

<h1>Defense Bond Impact Model</h1>
<div class="subtitle">
Structured analysis of how defense spending translates into bond market impact
</div>

<div class="grid">

<!-- INPUT -->
<div class="card">

<label>Defense Spending ($bn)</label>
<input type="range" id="spending" min="0" max="300" value="120">

<label>Inflation</label>
<select id="inflation">
<option>Low</option>
<option selected>Moderate</option>
<option>High</option>
</select>

<label>Issuance</label>
<select id="issuance">
<option>Short</option>
<option selected>Balanced</option>
<option>Long</option>
</select>

<label>Liquidity</label>
<select id="liq">
<option>Strong</option>
<option selected>Normal</option>
<option>Weak</option>
</select>

<button onclick="run()">Run Model</button>

</div>

<!-- OUTPUT -->
<div class="card">

<div class="tabs">
<div class="tab active" onclick="switchTab('overview')">Overview</div>
<div class="tab" onclick="switchTab('analysis')">Analysis</div>
<div class="tab" onclick="switchTab('risk')">Risk</div>
</div>

<div id="overview" class="section"></div>
<div id="analysis" class="section" style="display:none;"></div>
<div id="risk" class="section" style="display:none;"></div>

</div>

</div>

</div>

<script>

let isPro=false;

function switchTab(tab){
  document.getElementById("overview").style.display="none";
  document.getElementById("analysis").style.display="none";
  document.getElementById("risk").style.display="none";

  document.getElementById(tab).style.display="block";

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");
}

function run(){

  let s=+spending.value;
  let infl=inflation.value;
  let iss=issuance.value;
  let liqv=liq.value;

  let score=s*0.4;
  if(infl==="High") score+=25;
  if(liqv==="Weak") score+=20;
  score=Math.min(score,100);

  let yield=score>70?"Strong ↑":score>40?"Moderate ↑":"Neutral";
  let curve=iss==="Long"?"Steepening":iss==="Short"?"Flattening":"Neutral";

  let overviewHTML=`
  <div class="metric"><b>Yield:</b> ${yield}</div>
  <div class="metric"><b>Curve:</b> ${curve}</div>
  <div class="metric"><b>Impact Score:</b> ${Math.round(score)}</div>
  `;

  let analysisHTML="";
  let riskHTML="";

  if(isPro){

    let narrative=score>70?
    "Markets are likely pricing a supply-driven repricing environment.":
    "Markets are gradually adjusting expectations.";

    analysisHTML=`
    <div class="metric"><b>Market Interpretation:</b><br>${narrative}</div>
    <div class="metric"><b>Pressure Breakdown:</b><br>
    Supply: ${s>150?"High":"Moderate"} |
    Inflation: ${infl} |
    Policy: ${liqv}</div>
    <div class="metric"><b>Time Horizon:</b><br>
    Short-term: Reaction<br>
    Medium-term: Adjustment<br>
    Long-term: Structural shift</div>
    `;

    riskHTML=`
    <div class="metric"><b>Risk Map:</b><br>
    Volatility: ${score>60?"High":"Moderate"}<br>
    Liquidity Stress: ${liqv}<br>
    Policy Conflict: ${infl==="High"?"Elevated":"Moderate"}</div>

    <div class="metric"><b>Confidence:</b> ${Math.round(score)}%</div>
    `;

  } else {

    analysisHTML=`
    <div class="locked">Market Interpretation (Pro)</div>
    <div class="locked">Pressure Breakdown (Pro)</div>
    <div class="locked">Time Horizon (Pro)</div>
    `;

    riskHTML=`
    <div class="locked">Risk Map (Pro)</div>
    <div class="locked">Confidence Score (Pro)</div>

    <div class="upgrade">
    Unlock full model<br><br>
    <button onclick="upgrade()">Upgrade</button>
    </div>
    `;
  }

  overview.innerHTML=overviewHTML;
  analysis.innerHTML=analysisHTML;
  risk.innerHTML=riskHTML;

}

function upgrade(){
  alert("Redirect to Gumroad");
  // window.location.href="DEIN-LINK";
}

</script>

</body>
</html>
