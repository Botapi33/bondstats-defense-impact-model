<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Defense Bond Impact Terminal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== GLOBAL ===== */

body{
  margin:0;
  font-family:system-ui;
  background:#050a16;
  color:#e2e8f0;
}

.container{
  max-width:1500px;
  margin:auto;
  padding:25px;
}

h1{
  font-size:34px;
  margin-bottom:20px;
}

/* ===== GRID ===== */

.grid{
  display:grid;
  grid-template-columns:400px 1fr;
  gap:20px;
}

.panel{
  background:#0f172a;
  padding:20px;
  border-radius:10px;
}

/* ===== INPUT ===== */

label{
  font-size:13px;
  color:#94a3b8;
}

input,select{
  width:100%;
  margin-top:8px;
  margin-bottom:12px;
  padding:10px;
  background:#1e293b;
  border:none;
  color:white;
}

button{
  width:100%;
  padding:12px;
  background:#f97316;
  border:none;
  color:white;
  font-weight:bold;
  margin-top:10px;
  cursor:pointer;
}

/* ===== METRICS ===== */

.metrics{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:15px;
}

.metric{
  background:#020617;
  padding:12px;
  border-radius:8px;
}

.metric-title{
  font-size:12px;
  color:#94a3b8;
}

.metric-value{
  font-size:20px;
}

/* ===== CHART ===== */

canvas{
  background:#020617;
  border-radius:10px;
  margin-top:10px;
}

/* ===== TABS ===== */

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.tab{
  padding:8px 12px;
  background:#1e293b;
  cursor:pointer;
}

.active{
  background:#f97316;
}

.lock{
  opacity:0.3;
}

/* ===== PRO ===== */

.pro-box{
  margin-top:15px;
  padding:10px;
  background:#1e293b;
  text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h1>Defense Bond Impact Terminal</h1>

<div class="grid">

<!-- INPUT PANEL -->

<div class="panel">

<label>Defense Spending ($bn)</label>
<input type="range" id="spending" min="0" max="400" value="120">

<label>Inflation</label>
<select id="inflation">
<option>Low</option>
<option selected>Moderate</option>
<option>High</option>
</select>

<label>Liquidity</label>
<select id="liquidity">
<option>Strong</option>
<option selected>Normal</option>
<option>Weak</option>
</select>

<label>Policy</label>
<select id="policy">
<option>Supportive</option>
<option selected>Neutral</option>
<option>Restrictive</option>
</select>

<button onclick="run()">Run Model</button>
<button onclick="shock()">Shock</button>

</div>

<!-- OUTPUT PANEL -->

<div class="panel">

<div class="metrics">
<div class="metric">
<div class="metric-title">Impact</div>
<div class="metric-value" id="impact">0</div>
</div>

<div class="metric">
<div class="metric-title">Confidence</div>
<div class="metric-value" id="confidence">0</div>
</div>

<div class="metric">
<div class="metric-title">Regime</div>
<div class="metric-value" id="regime">-</div>
</div>

<div class="metric">
<div class="metric-title">Signal</div>
<div class="metric-value" id="signal">-</div>
</div>
</div>

<canvas id="timeline" width="800" height="200"></canvas>
<canvas id="curve" width="800" height="200"></canvas>

<div class="tabs">
<div class="tab active" onclick="tab('overview')">Overview</div>
<div class="tab" onclick="tab('analysis')">Analysis</div>
<div class="tab" onclick="tab('risk')">Risk</div>
</div>

<div id="overview"></div>
<div id="analysis" style="display:none"></div>
<div id="risk" style="display:none"></div>

</div>

</div>

</div>

<script>

/* ===== MODEL ===== */

function model(i){

let score =
i.spending*0.2 +
(i.inflation==="High"?25:10) +
(i.liquidity==="Weak"?20:5) +
(i.policy==="Restrictive"?15:5);

score = Math.min(score,100);

let confidence = 70 - (i.liquidity==="Weak"?20:5);

let regime =
score<40?"Stable":
score<70?"Adjustment":
"Repricing";

let signal =
score<30?"Weak":
score<60?"Developing":
"Strong";

return {score,confidence,regime,signal};
}

/* ===== TIMELINE ===== */

function drawTimeline(score){

let c=document.getElementById("timeline");
let ctx=c.getContext("2d");

ctx.clearRect(0,0,800,200);

ctx.strokeStyle="orange";
ctx.beginPath();

for(let t=0;t<10;t++){
let y=200-(score*(t/10))*1.5;
ctx.lineTo(t*80,y);
}

ctx.stroke();

}

/* ===== CURVE ===== */

function drawCurve(score){

let c=document.getElementById("curve");
let ctx=c.getContext("2d");

ctx.clearRect(0,0,800,200);

let base=[2,2.2,2.5,3,3.2];

let curve=base.map(v=>v+score/100);

ctx.strokeStyle="cyan";
ctx.beginPath();

curve.forEach((v,i)=>{
ctx.lineTo(i*150,200-v*30);
});

ctx.stroke();

}

/* ===== RUN ===== */

function run(){

let i={
spending:+spending.value,
inflation:inflation.value,
liquidity:liquidity.value,
policy:policy.value
};

let d=model(i);

impact.innerText=Math.round(d.score);
confidence.innerText=Math.round(d.confidence);
regime.innerText=d.regime;
signal.innerText=d.signal;

/* OVERVIEW */

overview.innerHTML = `
Impact driven by fiscal expansion and macro conditions.
`;

/* ANALYSIS */

analysis.innerHTML = `
Markets likely in ${d.regime} phase.
`;

/* RISK */

risk.innerHTML = `
Volatility: ${d.score>60?"High":"Moderate"}
`;

/* CHARTS */

drawTimeline(d.score);
drawCurve(d.score);

}

/* ===== SHOCK ===== */

function shock(){
spending.value = Math.min(+spending.value+100,400);
inflation.value="High";
liquidity.value="Weak";
policy.value="Restrictive";
run();
}

/* ===== TAB ===== */

function tab(name){
["overview","analysis","risk"].forEach(id=>{
document.getElementById(id).style.display="none";
});
document.getElementById(name).style.display="block";
event.target.classList.add("active");
}

run();

</script>

</body>
</html>
